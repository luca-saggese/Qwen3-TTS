version: '3.8'

services:
  qwen3-tts:
    image: qwen3-tts:latest
    container_name: qwen3-tts-demo
    ports:
      - "7860:7860"
    volumes:
      - models_cache:/app/models
      - ./examples:/app/examples
      - ./input:/app/input:rw
      - ./output:/app/output:rw
    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
      - GRADIO_SERVER_PORT=7860
      - HF_HOME=/app/models
      - TRANSFORMERS_CACHE=/app/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/info"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    ipc: host
    ulimits:
      memlock: -1
      stack: 67108864
    shm_size: '8gb'
    restart: unless-stopped

volumes:
  models_cache:
    driver: local
